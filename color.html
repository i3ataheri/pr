<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کارت طولی پاستیلی</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f7;
            font-family: 'Vazirmatn', sans-serif;
            box-sizing: border-box;
        }

        /* پالت رنگ - سازگار با موبایل */
        .palette-container {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            width: 100%;
            max-width: 380px;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr); /* ۱۰ ستون در دسکتاپ */
            gap: 6px;
        }

        @media (max-width: 400px) {
            .palette-grid {
                grid-template-columns: repeat(5, 1fr); /* ۵ ستون در موبایل‌های کوچک */
            }
        }

        .color-dot {
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: transform 0.2s ease;
        }

        .color-dot::after {
            content: attr(data-index);
            font-size: 10px;
            font-weight: bold;
            color: white;
            opacity: 0;
            pointer-events: none;
        }

        .color-dot:hover::after { opacity: 1; }
        .color-dot.light-bg::after { color: #333; }
        .color-dot:active { transform: scale(0.9); }
        .color-dot.active { outline: 2px solid #333; outline-offset: 1px; }

        /* کارت طولی (Vertical Card) */
        .card {
            width: 100%;
            max-width: 320px; /* عرض کم برای حالت طولی */
            height: 500px;    /* ارتفاع بلند */
            background-color: var(--card-bg);
            color: var(--text-color);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* پخش محتوا در طول کارت */
            box-sizing: border-box;
        }

        .card-top h2 {
            font-size: 1.8rem;
            margin: 0;
            font-weight: 700;
        }

        .card-body p {
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 0.85;
        }

        .card-footer {
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 20px;
        }

        .card-footer.dark-border {
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        #hexDisplay {
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="palette-container">
        <div class="palette-grid" id="grid"></div>
    </div>

    <div class="card" id="mainCard">
        <div class="card-top">
            <div style="font-size: 40px; margin-bottom: 10px;">🎨</div>
            <h2>شماره <span id="numDisplay">۱</span></h2>
        </div>
        
        <div class="card-body">
            <p>این یک طراحی طولی مدرن است. در این حالت، کارت برای نمایش در موبایل و استفاده به عنوان کارت ویزیت دیجیتال یا استوری بسیار مناسب است.</p>
        </div>

        <div class="card-footer" id="cardFooter">
            <div id="hexDisplay">#FFFFFF</div>
        </div>
    </div>

    <script>
        const colors = [
            "#f8f9fa", "#f1f3f5", "#fff5f5", "#fff9db", "#f3fdf4", "#f0f7ff", "#fdf2ff", "#fff0f6", "#fff4e6", "#eef2ff",
            "#ffc9c9", "#ffec99", "#b2f2bb", "#a5d8ff", "#eebefa", "#ffdeeb", "#d0ebff", "#c5f6fa", "#d3f9d8", "#ffe8cc",
            "#ffa8a8", "#ffd43b", "#8ce99a", "#74c0fc", "#da77f2", "#f783ac", "#4dabf7", "#3bc9db", "#69db7c", "#ffa94d",
            "#fa5252", "#fab005", "#40c057", "#228be6", "#be4bdb", "#e64980", "#fd7e14", "#adb5bd", "#868e96", "#495057",
            "#c92a2a", "#e67700", "#2b8a3e", "#1864ab", "#862e9c", "#a61e4d", "#555555", "#333333", "#1a1a1a", "#000000"
        ];

        const grid = document.getElementById('grid');
        const numDisplay = document.getElementById('numDisplay');
        const hexDisplay = document.getElementById('hexDisplay');
        const cardFooter = document.getElementById('cardFooter');
        const root = document.querySelector(':root');

        colors.forEach((color, index) => {
            const dot = document.createElement('div');
            dot.className = 'color-dot';
            dot.style.backgroundColor = color;
            dot.setAttribute('data-index', index + 1);
            
            if (getBrightness(color) > 200) dot.classList.add('light-bg');

            dot.addEventListener('click', () => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                updateCard(color, index + 1);
            });
            grid.appendChild(dot);
        });

        function updateCard(color, index) {
            root.style.setProperty('--card-bg', color);
            numDisplay.innerText = index;
            hexDisplay.innerText = color.toUpperCase();
            
            const brightness = getBrightness(color);
            if (brightness < 128) {
                root.style.setProperty('--text-color', '#ffffff');
                cardFooter.classList.add('dark-border');
            } else {
                root.style.setProperty('--text-color', '#333333');
                cardFooter.classList.remove('dark-border');
            }
        }

        function getBrightness(hex) {
            hex = hex.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            return (r * 299 + g * 587 + b * 114) / 1000;
        }

        grid.firstChild.click();
    </script>
</body>
</html>
