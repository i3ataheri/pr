<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل موبایل حرفه‌ای</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&family=Reem+Kufi:wght@500&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            background: #0f0c29;
            /* پس‌زمینه گرادینت متحرک */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .mobile-profile {
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        .profile-header {
            position: relative;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            padding: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .status-dot {
            position: absolute;
            bottom: 10px;
            right: 35%;
            width: 15px;
            height: 15px;
            background: #2ecc71;
            border-radius: 50%;
            border: 2px solid white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        h1 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 26px;
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
        }

        .occupation {
            font-weight: 300;
            font-size: 14px;
            opacity: 0.9;
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 4px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            background: rgba(0,0,0,0.1);
            padding: 15px;
            border-radius: 20px;
        }

        .stat-item b { display: block; font-size: 18px; }
        .stat-item span { font-size: 11px; opacity: 0.8; }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-main {
            background: white;
            color: #e73c7e;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 800;
            transition: 0.3s;
        }

        .btn-outline {
            background: transparent;
            color: white;
            padding: 13px;
            border-radius: 15px;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.4);
            font-size: 14px;
        }

        .btn-main:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="mobile-profile">
        <div class="profile-header">
            <img src="https://via.placeholder.com/150" alt="Avatar" class="profile-img">
            <div class="status-dot"></div>
        </div>

        <h1>ياسين القحطاني</h1>
        <div class="occupation">مطور تطبيقات الهواتف</div>

        <div class="stats-container">
            <div class="stat-item"><b>+50</b><span>مشروع</span></div>
            <div class="stat-item"><b>12K</b><span>متابع</span></div>
            <div class="stat-item"><b>4.9</b><span>تقييم</span></div>
        </div>

        <p style="font-size: 13px; line-height: 1.6; margin-bottom: 25px;">
            شغوف بتحويل الأفكار المعقدة إلى واجهات مستخدم بسيطة وجميلة. خبرة 5 سنوات في بناء تجارب رقمية مذهلة.
        </p>

        <div class="action-buttons">
            <a href="#" class="btn-main">ابدأ مشروعك الآن</a>
            <a href="#" class="btn-outline">مشاهدة أعمالي</a>
        </div>
    </div>

</body>
</html>
