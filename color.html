<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عبدالله البلوشي | البروفايل</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .mobile-profile {
            width: 92%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 30px 20px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        .profile-icon-box {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            font-size: 40px;
        }

        h1 {
            font-family: 'Almarai', sans-serif;
            font-weight: 800;
            font-size: 28px; /* درشت‌تر برای نام */
            margin: 10px 0 5px 0;
        }

        .occupation {
            font-weight: 700;
            font-size: 15px; /* افزایش سایز تخصص */
            background: rgba(0, 0, 0, 0.15);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .services-list {
            text-align: right;
            margin: 10px 0 25px 0;
            padding: 0;
            list-style: none;
        }

        .services-list li {
            font-size: 14.5px; /* افزایش چشمگیر سایز تیترهای خدمات */
            font-weight: 500;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.12);
            padding: 12px 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-right: 5px solid white;
            line-height: 1.4;
        }

        .services-list i {
            font-size: 18px; /* آیکون‌های لیست هم بزرگتر شدند */
            min-width: 25px;
            text-align: center;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-main {
            background: #25d366;
            color: white;
            padding: 16px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 800;
            font-size: 18px; /* درشت‌تر برای خوانایی سریع */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-main i {
            font-size: 32px; /* آیکون واتس‌اپ کاملاً واضح */
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px;
            border-radius: 18px;
            text-decoration: none;
            border: 2px solid rgba(255,255,255,0.4);
            font-size: 16px;
            font-weight: 700;
        }

        .btn-main:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="mobile-profile">
        <div class="profile-header">
            <div class="profile-icon-box">
                <i class="fas fa-laptop-code"></i>
            </div>
        </div>
        
        <h1>عبدالله البلوشي</h1>
        <div class="occupation">مصمم جرافيك ومبرمج</div>

        <ul class="services-list">
            <li><i class="fas fa-code"></i> تصميم وبرمجة قوائم HTML</li>
            <li><i class="fas fa-utensils"></i> تصميم منيو أونلاين تفاعلي</li>
            <li><i class="fas fa-video"></i> صناعة منيو فيديو احترافي</li>
            <li><i class="fas fa-cube"></i> طباعة ميداليات مفاتيح 3D</li>
            <li><i class="fas fa-star"></i> ستاندات تقييم جوجل ذكية</li>
            <li><i class="fas fa-layer-group"></i> طباعة ثلاثية الأبعاد للهدايا</li>
        </ul>

        <div class="action-buttons">
            <a href="https://wa.me/966548471318" class="btn-main">
                <i class="fab fa-whatsapp"></i> اطلب الآن
            </a>
            <a href="portfolio.html" class="btn-outline">مشاهدة أعمالي</a>
        </div>
    </div>

</body>
</html>
