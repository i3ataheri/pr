<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي - الأستاذ محمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=1000');
            background-size: cover;
            background-position: center;
            filter: blur(12px);
            z-index: -1;
            transform: scale(1.1);
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px);
            width: 90%; /* انعطاف برای موبایل */
            max-width: 400px; /* حداکثر عرض */
            padding: 30px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            color: #1a4d2e;
            margin: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #d4af37;
            object-fit: cover;
            margin-bottom: 15px;
            background: #fff;
        }

        h1 { font-size: 24px; margin: 10px 0; color: #1a4d2e; }
        .title-job { font-size: 16px; color: #7a5d10; font-weight: 600; margin-bottom: 15px; }
        .description { font-size: 14px; color: #222; line-height: 1.6; margin-bottom: 20px; }

        .social-links { display: flex; justify-content: center; gap: 10px; }
        .social-links a {
            color: #1a4d2e;
            font-size: 20px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            text-decoration: none;
            transition: 0.3s;
        }
        .social-links a:hover { background: #d4af37; color: #fff; }

        .footer-verse {
            margin-top: 25px;
            font-size: 16px;
            color: #1a4d2e;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="profile-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/76/%D8%A7%D9%84%D9%82%D8%A8%D8%A9_%D8%A7%D9%84%D8%AE%D8%B6%D8%B1%D8%A7%D8%A1.jpg" alt="قبة الخضراء" class="profile-img">
        
        <h1>الأستاذ محمد</h1>
        <div class="title-job">مدير حلقات الحفظ في جامع عمر بن الخطاب بباقدو - مدينة الرسول ﷺ</div>
        
        <p class="description">
            مشرف تربوي متخصص في تطوير مناهج التحفيظ. نهدف إلى غرس محبة القرآن الكريم في نفوس الناشئة وفق منهجية واضحة وميسرة في رحاب طيبة الطيبة.
        </p>
        
        <div class="social-links">
            <a href="#"><i class="fab fa-snapchat"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/966546767251"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
        </div>

        <div class="footer-verse">
            «خَيْرُكُمْ مَنْ تَعَلَّمَ القُرْآنَ وَعَلَّمَهُ»
        </div>
    </div>

</body>
</html>
